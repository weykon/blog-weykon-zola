<h2 class="title">
  双拼-easy
</h2>
<p class="subtitle"><strong>2023-01-08T08:17:48Z</strong></p>
<p>我认为第一步要区分准备好以下的重要声母:</p>
<ol>
<li>sh U</li>
<li>ch I</li>
<li>zh V</li>
</ol>
<p>然后集中这三个声母的练习</p>
<p>zh: 这、中、只、真、之、种、张、找</p>
<p>做到看到这些字能够快知道是V</p>
<p>这几个太常用了，开始非常容易搞错而影响速度。</p>
<p>ch: 吃、出、成、车、穿、长、场、超</p>
<p>看到这些字快速知道是I</p>
<p>然后到sh
sh: 熵、是、说、上、时、谁、事
这些看到也要快速知道是U</p>

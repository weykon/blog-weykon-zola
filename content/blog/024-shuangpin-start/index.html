  双拼-start
</h2>
<p class="subtitle"><strong>2023-01-08T08:14:26Z</strong></p>
<p>我是使用https://api.ihint.me/shuang/这个来练习
使用的是小鹤双拼</p>
<p>一开始只能一个键一个键来打，非常慢</p>
<p>我是先记住 en、eng、an、ang 这四个的键位
对应的是 fghj ，左右手的食指就放在最近的位置
先把关于这几个键的练习好，就能进入下一步了</p>
<p>下一步我觉得比较连贯的是: uan、iao、ian 的练习
他们分别对应的是 r、n、m</p>

<h2 class="title">
  「推荐」Bookmarks 让理解力更强
</h2>
<p class="subtitle"><strong>2022-11-08T09:59:13Z</strong></p>
<p><a href="https://marketplace.visualstudio.com/items?itemName=alefragnani.Bookmarks">Bookmarks</a></p>
<h3 id="tui-jian-li-you">推荐理由</h3>
<p>在一些庞大的代码下，里面参杂不同<code>复杂</code>度的逻辑和结构，</p>
<p>我们的人脑不可能一直对一个仓库时刻<code>保持原有的理解</code>，</p>
<p>非常需要给自己一条指引的<code>明路</code>。</p>
<ul>
<li>
<p>全文索引，全文跳转。</p>
</li>
<li>
<p>而且插件的标签备注，不用在代码层面上添加多余的注释。</p>
</li>
</ul>
<h3 id="shi-yong-chang-jing">使用场景</h3>
<ul>
<li><em>初识源码</em></li>
<li><em>让项目保持理解热度</em></li>
<li><em>代码之间跳转</em></li>
</ul>

<h2 class="title">
  「tip」怎么在下午减少打盹儿？
</h2>
<p class="subtitle"><strong>2022-10-20T06:20:05Z</strong></p>
<p>程序员的习惯往往是异于常人的。<br />
而且程序员之间也往往异于彼此的。<br />
不过常常遇见到程序员会在下午容易打盹儿。</p>
<p>以下给出几个建议，来预防打盹儿：</p>
<ol>
<li>
<p>避免开启耳机降噪</p>
</li>
<li>
<p>避免处于接受状态, 比如: <em>看视频、阅读、听歌</em>
要主动处于输出状态, 比如: <em>写文、记录</em></p>
</li>
<li>
<p>避免喝了浓咖啡，而更适合喝水</p>
</li>
<li>
<p>避免使用 IDE 暗黑模式的皮肤</p>
</li>
<li>
<p>有条件的话，站立工作</p>
</li>
</ol>

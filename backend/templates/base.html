<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Weykon's Blog{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#667eea',
                        secondary: '#764ba2',
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ base_path | default(value="") | safe }}/static/css/style.css">
    <link rel="stylesheet" href="{{ base_path | default(value="") | safe }}/static/css/components.css">
    <link rel="stylesheet" href="{{ base_path | default(value="") | safe }}/static/css/matrix-rain.css">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">

    {% block extra_head %}{% endblock %}
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1 0 auto;
        }
        footer {
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="container">
                <a href="{{ base_path | default(value="") | safe }}/" class="logo">Weykon</a>
                <ul class="nav-links">
                    <li><a href="{{ base_path | default(value="") | safe }}/">Home</a></li>
                    <li><a href="{{ base_path | default(value="") | safe }}/posts">Posts</a></li>
                    <li><a href="{{ base_path | default(value="") | safe }}/mutters">Mutters</a></li>
                    <li><a href="{{ base_path | default(value="") | safe }}/tags/database">Tags</a></li>
                    <li><a href="{{ base_path | default(value="") | safe }}/admin">Admin</a></li>
                    <!-- Login button (shown when not authenticated) -->
                    <li id="login-nav-item"><a href="{{ base_path | default(value="") | safe }}/auth/login" class="login-button">Login</a></li>
                    <!-- User menu (shown when authenticated) -->
                    <li id="user-menu" style="display: none; position: relative;">
                        <button id="user-menu-button" style="background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 8px;">
                            <img id="user-avatar" src="" alt="User" style="width: 32px; height: 32px; border-radius: 50%; object-fit: cover;">
                            <span id="user-name" style="color: #667eea; font-weight: 500;"></span>
                        </button>
                        <div id="user-dropdown" style="display: none; position: absolute; right: 0; top: 100%; background: white; border: 1px solid #e5e7eb; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 8px; min-width: 200px; z-index: 1000;">
                            <div style="padding: 12px; border-bottom: 1px solid #e5e7eb;">
                                <div style="font-weight: 600; color: #1f2937;" id="dropdown-name"></div>
                                <div style="font-size: 14px; color: #6b7280; margin-top: 4px;" id="dropdown-email"></div>
                            </div>
                            <a href="{{ base_path | default(value="") | safe }}/auth/logout" style="display: block; padding: 12px; color: #dc2626; text-decoration: none; transition: background 0.2s;">Logout</a>
                        </div>
                    </li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Weykon's Blog. Built with Rust & Axum.</p>
        </div>
    </footer>

    <script>
        // Define base path for JavaScript
        window.basePath = '{{ base_path | default(value="") | safe }}';
    </script>
    <script src="{{ base_path | default(value="") | safe }}/static/js/main.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
